services:
  # ── Streamlit frontend (port 8080) ──────────────────────────────
  front:
    build:
      context: ./frontend
    ports:
      - "8090:8080"
    environment:
      - BACKEND_URL=http://back:8000
    depends_on:
      back:
        condition: service_healthy
  # ── FastAPI backend (port 8000) ─────────────────────────────────
  back:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    # Docker Model Runner injects LLM_URL and LLM_MODEL automatically
    models:
      - llm
    environment:
      - PROJECT_ID=serial-techos
      - DATA_PROJECT_ID=bigquery-public-data
      - DATASET_ID=google_cloud_release_notes
      - TABLE_ID=release_notes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
# ── Docker Model Runner ─────────────────────────────────────────
models:
  llm:
    model: ai/llama3.2
    context_size: 32768
    x-google-cloudrun:
      environment:
        PORT: 12434
        MODEL_RUNNER_PORT: 12434
      run-model:
        inference-container: docker/model-runner

